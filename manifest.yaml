version: 1
description: 外部 vendored 组件溯源清单 — 仅记录上游可追溯、未修改或轻改的关键模块

components:
  - name: nlohmann/json
    local_path: ws_main/src/planner/scene_graph/include/nlohmann/
    upstream: https://github.com/nlohmann/json
    upstream_version: "3.12.0"
    license: MIT
    description: C++ JSON 序列化/反序列化库 (header-only)

  - name: libleidenalg
    local_path: ws_main/src/planner/scene_graph/libs/libleidenalg/
    upstream: https://github.com/vtraag/libleidenalg
    upstream_version: "0.11.0"
    license: Permissive
    description: 图社区检测 Leiden 算法 C++ 实现，依赖 igraph

  - name: Boost.odeint
    local_path: ws_main/src/planner/uav_simulator/so3_quadrotor_simulator/include/ode/
    upstream: https://github.com/boostorg/odeint
    upstream_version: "2.1 / 2.2"
    license: BSL-1.0
    description: ODE 数值求解器，用于四旋翼动力学仿真积分

  - name: catkin_simple
    local_path: ws_main/src/utils/catkin_simple/
    upstream: https://github.com/catkin/catkin_simple
    upstream_version: "0.1.1"
    license: BSD
    description: ROS catkin CMake 宏简化工具

  - name: cv_bridge_noetic_fit_version
    local_path: ws_main/src/network/NetBridgeForSwarm/cv_bridge_noetic_fit_version/
    upstream: https://github.com/ros-perception/vision_opencv
    upstream_version: "1.16.2"
    license: BSD
    description: ROS ↔ OpenCV 图像格式转换，适配 Noetic

  - name: sam2
    local_path: yoloe/third_party/sam2/
    upstream: https://github.com/facebookresearch/sam2
    upstream_version: "1.0"
    license: Apache-2.0
    description: Meta SAM 2 分割基础模型

  - name: ml-mobileclip
    local_path: yoloe/third_party/ml-mobileclip/
    upstream: https://github.com/apple/ml-mobileclip
    upstream_version: 未标记版本 (2025-07 快照)
    license: Apple License
    description: Apple 轻量级 CLIP 图文模型

  - name: CLIP
    local_path: yoloe/third_party/CLIP/
    upstream: https://github.com/openai/CLIP
    upstream_version: "1.0"
    license: MIT
    description: OpenAI CLIP 图文对齐预训练模型

  - name: lvis-api
    local_path: yoloe/third_party/lvis-api/
    upstream: https://github.com/lvis-dataset/lvis-api
    upstream_version: "0.5.3"
    license: BSD
    description: LVIS 大规模词汇实例分割数据集 API

  - name: fast-reid
    local_path: yoloe/fast-reid/
    upstream: https://github.com/JDAI-CV/fast-reid
    upstream_version: "1.3"
    license: Apache-2.0
    description: JDAI 行人/车辆重识别工具箱，YOLOE 中用于 ReID 追踪

  - name: ROS-TCP-Endpoint
    local_path: ws_main/src/unity_utils/ROS-TCP-Endpoint/
    upstream: https://github.com/Unity-Technologies/ROS-TCP-Endpoint
    upstream_version: 未标记版本
    license: MIT
    description: Unity ↔ ROS TCP 通信端点

  - name: unity_robotics_demo
    local_path: ws_main/src/unity_utils/unity_robotics_demo_msgs/
    upstream: https://github.com/Unity-Technologies/Unity-Robotics-Hub
    upstream_version: "0.0.0"
    license: Apache-2.0
    description: Unity Robotics 演示消息与服务定义
