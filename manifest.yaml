version: 1
description: 外部 vendored 组件溯源清单 — 仅记录上游可追溯、未修改或轻改的关键模块

components:
  - name: nlohmann/json
    local_path: ws_main/src/planner/scene_graph/include/nlohmann/
    upstream: https://github.com/nlohmann/json
    upstream_version: "3.12.0"
    license: MIT
    description: C++ JSON 序列化/反序列化库 (header-only)

  - name: libleidenalg
    local_path: ws_main/src/planner/scene_graph/libs/libleidenalg/
    upstream: https://github.com/vtraag/libleidenalg
    upstream_version: "0.11.0"
    license: Permissive
    description: 图社区检测 Leiden 算法 C++ 实现，依赖 igraph

  - name: Boost.odeint
    local_path: ws_main/src/planner/uav_simulator/so3_quadrotor_simulator/include/ode/
    upstream: https://github.com/boostorg/odeint
    upstream_version: "2.1 / 2.2"
    license: BSL-1.0
    description: ODE 数值求解器，用于四旋翼动力学仿真积分

  - name: catkin_simple
    local_path: ws_main/src/utils/catkin_simple/
    upstream: https://github.com/catkin/catkin_simple
    upstream_version: "0.1.1"
    license: BSD
    description: ROS catkin CMake 宏简化工具
